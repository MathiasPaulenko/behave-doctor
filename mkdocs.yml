site_name: behave-doctor
site_description: Static analysis and diagnostics for Behave BDD suites.
site_author: Mathias Paulenko
site_url: https://mathiaspaulenko.github.io/behave-doctor/
repo_url: https://github.com/MathiasPaulenko/behave-doctor
repo_name: MathiasPaulenko/behave-doctor
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Guide:
      - Installation: installation.md
      - Quick Start: quickstart.md
      - CLI: cli.md
      - Configuration: configuration.md
  - Rules:
      - Overview: rules/index.md
      - Structure (BD101-104): rules/structure.md
      - Quality (BD201-204): rules/quality.md
      - Coverage (BD301-304): rules/coverage.md
      - Complexity (BD401-403): rules/complexity.md
      - Dependencies (BD501-503): rules/dependencies.md
  - Reference:
      - Reporters: reporters.md
      - Python API: python-api.md
      - Architecture: architecture.md
  - Integrations:
      - CI/CD: ci-cd.md
      - Contributing: contributing.md
  - FAQ: faq.md
  - Changelog: changelog.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - def_list
  - footnotes
